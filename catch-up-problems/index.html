<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>追及问题闯关 🏃‍♀️</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #FFF5E1 0%, #FFE5E1 50%, #E1F0FF 100%);
    color: #5D4954;
    margin: 0;
    padding: 16px;
    line-height: 1.6;
    font-size: 18px;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 20px 0 12px;
  }
  .header h1 {
    color: #FF6B6B;
    font-size: 32px;
    margin: 0 0 6px;
  }
  .header .subtitle {
    color: #B89B9B;
    font-size: 16px;
    margin: 0;
  }

  .progress-card {
    background: white;
    border-radius: 20px;
    padding: 18px 22px;
    margin: 20px 0;
    box-shadow: 0 4px 16px rgba(255,154,162,0.18);
    text-align: center;
  }
  .progress-card .title {
    font-size: 16px;
    color: #888;
    margin-bottom: 10px;
  }
  .progress-card .count {
    font-size: 32px;
    color: #FF6B6B;
    font-weight: bold;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 14px;
    background: #FFE5E1;
    border-radius: 7px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FFB7B2, #FF6B6B);
    border-radius: 7px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .levels {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 20px 0;
  }
  .level-card {
    background: white;
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 4px 14px rgba(255,154,162,0.15);
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 2px solid transparent;
  }
  .level-card:active {
    transform: scale(0.98);
  }
  .level-card.done {
    border-color: #B5EAD7;
    background: linear-gradient(180deg, #FFFFFF, #F4FFF9);
  }
  .level-card.locked {
    background: #F8F8F8;
    cursor: not-allowed;
    opacity: 0.7;
  }

  .level-num {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #FFB7B2, #FF6B6B);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(255,107,107,0.3);
  }
  .level-card.done .level-num {
    background: linear-gradient(135deg, #B5EAD7, #4CC76C);
  }
  .level-card.locked .level-num {
    background: #DDD;
    box-shadow: none;
  }

  .level-info {
    flex: 1;
    min-width: 0;
  }
  .level-title {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #5D4954;
  }
  .level-desc {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
  }
  .level-tag {
    display: inline-block;
    font-size: 12px;
    color: #FF6B6B;
    background: #FFE5E1;
    padding: 2px 8px;
    border-radius: 6px;
    margin-top: 6px;
    font-weight: 600;
  }
  .level-card.done .level-tag {
    color: #2A6B5E;
    background: #D4EDDA;
  }
  .level-card.locked .level-tag {
    color: #999;
    background: #EAEAEA;
  }

  .level-status {
    flex-shrink: 0;
    font-size: 28px;
  }

  .footer {
    text-align: center;
    padding: 30px 0 20px;
    color: #B89B9B;
    font-size: 14px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid #DDD;
    color: #999;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
    font-family: inherit;
  }
  .reset-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏃‍♀️ 追及问题闯关</h1>
    <p class="subtitle">从入门到大师 · 一关一关搞定</p>
  </div>

  <div class="progress-card">
    <div class="title">你的进度</div>
    <div class="count"><span id="done-count">0</span> / 5 关</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="levels" id="levels-list">
    <!-- 动态生成 -->
  </div>

  <div class="footer">
    🌸 加油!每过一关都更厉害一点点~
    <br>
    <button class="reset-btn" onclick="resetProgress()">重置进度</button>
  </div>
</div>

<script>
const LEVELS = [
  {
    n: 1,
    title: '经典追及',
    desc: 'A 在前面走,B 在后面追。两个人同时出发。',
    tag: '入门关 · 学公式',
    file: 'level-1.html',
    locked: false
  },
  {
    n: 2,
    title: '时间差追及',
    desc: '一个先出发,过几分钟后另一个才追。距离差要自己算!',
    tag: '进阶关 · 多一步',
    file: 'level-2.html',
    locked: false
  },
  {
    n: 3,
    title: '反过来求',
    desc: '知道追上时间,反过来求速度。同一个公式倒着用。',
    tag: '高阶关 · 倒着想',
    file: 'level-3.html',
    locked: false
  },
  {
    n: 4,
    title: '分段追及',
    desc: '中途停下、中途变速怎么办?切几段,每段单独算!',
    tag: '挑战关 · 分段思考',
    file: 'level-4.html',
    locked: false
  },
  {
    n: 5,
    title: '环形跑道',
    desc: '圆圈上的追逐——快的人要多跑一整圈才算追上!',
    tag: '大师关 · 圆上追逐',
    file: 'level-5.html',
    locked: false
  }
];

function isDone(n) {
  return localStorage.getItem('catch-up-lv' + n + '-done') === '1';
}

function render() {
  const list = document.getElementById('levels-list');
  list.innerHTML = '';
  let doneCount = 0;

  LEVELS.forEach(lv => {
    const done = isDone(lv.n);
    if (done) doneCount++;

    const card = document.createElement(lv.locked ? 'div' : 'a');
    card.className = 'level-card' + (done ? ' done' : '') + (lv.locked ? ' locked' : '');
    if (!lv.locked) card.href = lv.file;

    const status = done ? '✅' : (lv.locked ? '🔒' : '👉');

    card.innerHTML = `
      <div class="level-num">${lv.n}</div>
      <div class="level-info">
        <div class="level-title">${lv.title}</div>
        <div class="level-desc">${lv.desc}</div>
        <div class="level-tag">${done ? '已通关 ✓' : lv.tag}</div>
      </div>
      <div class="level-status">${status}</div>
    `;
    list.appendChild(card);
  });

  document.getElementById('done-count').textContent = doneCount;
  document.getElementById('progress-fill').style.width = (doneCount / LEVELS.length * 100) + '%';
}

function resetProgress() {
  if (confirm('要把所有进度都重置吗?')) {
    for (let i = 1; i <= 5; i++) {
      localStorage.removeItem('catch-up-lv' + i + '-done');
    }
    render();
  }
}

render();
</script>
</body>
</html>
