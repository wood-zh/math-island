<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数学冒险岛 🏝️</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #FFF5E1 0%, #FFE5E1 40%, #C8E7F0 100%);
    color: #5D4954;
    margin: 0; padding: 0;
    line-height: 1.6; font-size: 18px;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }

  .hero {
    text-align: center;
    padding: 28px 0 16px;
    position: relative;
  }
  .hero h1 {
    color: #FF6B6B;
    font-size: 36px;
    margin: 0 0 8px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.8);
  }
  .hero .subtitle {
    color: #888;
    font-size: 15px;
    margin: 0;
  }
  .ocean-divider {
    height: 26px;
    margin: 8px 0 0;
    background:
      radial-gradient(circle at 8px 26px, transparent 8px, #B8DEE8 8px, #B8DEE8 10px, transparent 10px),
      radial-gradient(circle at 26px 26px, transparent 8px, #C8E7F0 8px, #C8E7F0 10px, transparent 10px);
    background-size: 36px 26px;
    background-repeat: repeat-x;
    opacity: 0.6;
  }

  .progress-card {
    background: white;
    border-radius: 18px;
    padding: 16px 20px;
    margin: 16px 0;
    box-shadow: 0 4px 14px rgba(255,154,162,0.15);
    text-align: center;
  }
  .progress-card .label { font-size: 14px; color: #888; }
  .progress-card .num {
    font-size: 28px; color: #FF6B6B;
    font-weight: bold; margin: 6px 0 10px;
  }
  .progress-bar {
    height: 12px;
    background: #FFE5E1;
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #FFB7B2, #FF6B6B);
    border-radius: 6px;
    transition: width 0.5s ease;
  }

  .section-title {
    font-size: 16px;
    color: #888;
    margin: 24px 0 10px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .island-card {
    background: white;
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(255,154,162,0.15);
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.15s;
    border: 2px solid transparent;
  }
  .island-card:active { transform: scale(0.98); }
  .island-card.completed {
    border-color: #B5EAD7;
    background: linear-gradient(180deg, #FFFFFF, #F4FFF9);
  }
  .island-card.mysterious {
    background: linear-gradient(180deg, #F4F4F4, #EAEAEA);
    cursor: default;
    opacity: 0.75;
  }

  .island-emoji {
    flex-shrink: 0;
    font-size: 48px;
    line-height: 1;
  }
  .island-info { flex: 1; min-width: 0; }
  .island-name {
    font-size: 20px; font-weight: 700;
    color: #5D4954; margin-bottom: 3px;
  }
  .island-desc {
    font-size: 14px; color: #888; margin-bottom: 6px;
  }
  .island-progress {
    font-size: 13px; color: #FF6B6B;
    font-weight: 600;
  }
  .island-card.completed .island-progress { color: #2A6B5E; }
  .island-card.mysterious .island-progress { color: #999; }

  .island-arrow {
    flex-shrink: 0;
    font-size: 24px;
    color: #FFB7B2;
  }
  .island-card.completed .island-arrow { color: #4CC76C; }
  .island-card.mysterious .island-arrow { display: none; }

  .footer {
    text-align: center;
    padding: 28px 0 20px;
    color: #888;
    font-size: 14px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid #DDD;
    color: #999;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
    font-family: inherit;
  }
  .reset-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🏝️ 数学冒险岛</h1>
    <p class="subtitle">你的数学探险地图 · 一座岛一座岛地征服</p>
  </div>
  <div class="ocean-divider"></div>

  <div class="progress-card">
    <div class="label">你的探险进度</div>
    <div class="num">已通过 <span id="total-done">0</span> 关</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="section-title">🗺️ 已发现的岛屿</div>
  <div id="discovered-list"></div>

  <div class="section-title">🌫️ 待发现的岛屿</div>
  <div id="mysterious-list"></div>

  <div class="footer">
    🌸 每一关都是新的探险 · 加油!
    <br>
    <button class="reset-btn" onclick="resetAll()">重置全部进度</button>
  </div>
</div>

<script>
// 每个岛屿的元数据
// 添加新专题时,在这里加一个 entry
const ISLANDS = [
  {
    id: 'catch-up',
    folder: 'catch-up-problems',
    name: '追及岛',
    emoji: '🏝️',
    desc: '学会:姐姐怎么追上妹妹(速度追逐问题)',
    keyPrefix: 'catch-up-lv',
    totalLevels: 5,
    availableLevels: 4,
    discovered: true
  }
  // 未来的岛屿会逐渐加在这里:
  // { id: 'fenshu', folder: 'fenshu-gainian', name: '分数岛', emoji: '🍕', ... }
];

// 神秘岛屿(占位,等开发好就移到上面)
const MYSTERIOUS = [
  { emoji: '🌫️', name: '??? 岛', desc: '迷雾中,等待新冒险...' },
  { emoji: '🌫️', name: '??? 岛', desc: '神秘力量正在凝聚...' }
];

function countDone(island) {
  let count = 0;
  for (let i = 1; i <= island.availableLevels; i++) {
    if (localStorage.getItem(island.keyPrefix + i + '-done') === '1') count++;
  }
  return count;
}

function render() {
  let totalDone = 0;
  let totalAvailable = 0;

  // 已发现的岛
  const discoveredEl = document.getElementById('discovered-list');
  discoveredEl.innerHTML = '';
  ISLANDS.forEach(island => {
    const done = countDone(island);
    totalDone += done;
    totalAvailable += island.availableLevels;
    const completed = (done === island.availableLevels);

    const a = document.createElement('a');
    a.className = 'island-card' + (completed ? ' completed' : '');
    a.href = island.folder + '/index.html';

    const status = completed ? '✅ 这座岛全部通关!' : `${done} / ${island.availableLevels} 关已通${island.totalLevels > island.availableLevels ? ' · 还有更多关卡待解锁' : ''}`;

    a.innerHTML = `
      <div class="island-emoji">${island.emoji}</div>
      <div class="island-info">
        <div class="island-name">${island.name}</div>
        <div class="island-desc">${island.desc}</div>
        <div class="island-progress">${status}</div>
      </div>
      <div class="island-arrow">→</div>
    `;
    discoveredEl.appendChild(a);
  });

  // 神秘岛
  const mysteriousEl = document.getElementById('mysterious-list');
  mysteriousEl.innerHTML = '';
  MYSTERIOUS.forEach(island => {
    const div = document.createElement('div');
    div.className = 'island-card mysterious';
    div.innerHTML = `
      <div class="island-emoji">${island.emoji}</div>
      <div class="island-info">
        <div class="island-name">${island.name}</div>
        <div class="island-desc">${island.desc}</div>
        <div class="island-progress">敬请期待</div>
      </div>
    `;
    mysteriousEl.appendChild(div);
  });

  // 总进度
  document.getElementById('total-done').textContent = totalDone;
  document.getElementById('progress-fill').style.width = (totalAvailable > 0 ? totalDone / totalAvailable * 100 : 0) + '%';
}

function resetAll() {
  if (confirm('要把所有岛屿的进度都重置吗?')) {
    ISLANDS.forEach(island => {
      for (let i = 1; i <= island.totalLevels; i++) {
        localStorage.removeItem(island.keyPrefix + i + '-done');
      }
    });
    render();
  }
}

render();
</script>
</body>
</html>
